name: "Build & Release"

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# Push to main when desktop source changes → auto-release (reads version from
# tauri.conf.json; prerelease inferred from semver pre-id, e.g. 1.0.0-beta.1).
#
# workflow_dispatch → manual release.
#   • version      — the new version to publish (required)
#   • release_type — explicit choice: stable or pre-release
#   The workflow bumps tauri.conf.json, Cargo.toml and package.json, commits
#   back to main with [skip ci], then tags and builds.
#
# IDE Update System integration
# ──────────────────────────────
# The built-in updater (apps/desktop/src-tauri/src/commands/updater.rs):
#   Stable channel  → GET /repos/hyskasoftware/Hyscode/releases/latest
#   Pre-release ch. → GET /repos/hyskasoftware/Hyscode/releases?per_page=1
#
# Asset selection by extension:
#   Windows → .exe (preferred) or .msi
#   Linux   → .AppImage (preferred) or .deb
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "New version (e.g. 1.2.3 or 1.2.3-beta.1)"
        required: true
        type: string
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - stable
          - pre-release
        default: stable

env:
  TAURI_SIGNING_PRIVATE_KEY: ""

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Create tag + draft release
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      tag_name:   ${{ steps.get-version.outputs.tag }}
      version:    ${{ steps.get-version.outputs.version }}
      prerelease: ${{ steps.get-version.outputs.prerelease }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Use GH_PAT so the version-bump commit is not ignored by Actions.
          # Falls back to GITHUB_TOKEN if the secret is not set.
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              echo "::error::Version input is required for manual dispatch"
              exit 1
            fi
            # Prerelease is an explicit user choice
            if [ "${{ github.event.inputs.release_type }}" = "pre-release" ]; then
              IS_PRERELEASE=true
            else
              IS_PRERELEASE=false
            fi
          else
            # Push trigger: read version from root package.json
            BASE=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
            VERSION="${BASE}-build.${{ github.run_number }}"
            # If base version has a pre-release identifier (e.g. 0.1.0-preview) → pre-release
            if echo "$BASE" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-.+'; then
              IS_PRERELEASE=true
            else
              IS_PRERELEASE=false
            fi
          fi
          echo "version=$VERSION"          >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"             >> "$GITHUB_OUTPUT"
          echo "prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Releasing: $VERSION  |  pre-release: $IS_PRERELEASE"

      - name: Bump version in source files
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ steps.get-version.outputs.version }}
        run: |
          # ── tauri.conf.json ──────────────────────────────────────────────
          python3 -c "import json,os; p='apps/desktop/src-tauri/tauri.conf.json'; d=json.load(open(p)); d['version']=os.environ['VERSION']; open(p,'w').write(json.dumps(d,indent=2,ensure_ascii=False)+'\n')"
          # ── Cargo.toml (only the [package] version — first match) ────────
          sed -i "0,/^version = \"[^\"]*\"/{s/^version = \"[^\"]*\"/version = \"$VERSION\"/}" apps/desktop/src-tauri/Cargo.toml
          # ── apps/desktop/package.json ────────────────────────────────────
          python3 -c "import json,os; p='apps/desktop/package.json'; d=json.load(open(p)); d['version']=os.environ['VERSION']; open(p,'w').write(json.dumps(d,indent=2,ensure_ascii=False)+'\n')"
          echo "Bumped version to $VERSION in tauri.conf.json, Cargo.toml, package.json"

      - name: Commit and push version bump
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/src-tauri/tauri.conf.json \
                  apps/desktop/src-tauri/Cargo.toml \
                  apps/desktop/package.json
          if git diff --cached --quiet; then
            echo "Files already at version ${{ steps.get-version.outputs.version }} — nothing to commit"
          else
            git commit -m "chore: bump version to ${{ steps.get-version.outputs.version }} [skip ci]"
            git push
            echo "✓ Version bump committed and pushed"
          fi

      - name: Create git tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const tag = "${{ steps.get-version.outputs.tag }}"
            // Resolve current HEAD (after the version-bump commit, if any)
            const branch = context.ref.startsWith('refs/heads/')
              ? context.ref.slice('refs/heads/'.length)
              : context.ref
            const { data: branchRef } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   `heads/${branch}`,
            })
            const sha = branchRef.object.sha
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                ref:   `refs/tags/${tag}`,
                sha:   sha,
              })
              console.log(`✓ Tag ${tag} created at ${sha.slice(0, 7)}`)
            } catch (e) {
              if (e.status === 422) {
                console.log(`Tag ${tag} already exists — continuing`)
              } else {
                throw e
              }
            }

      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const version    = "${{ steps.get-version.outputs.version }}"
            const tag        = "${{ steps.get-version.outputs.tag }}"
            const prerelease = "${{ steps.get-version.outputs.prerelease }}" === "true"
            const body = [
              `## HysCode ${tag}`,
              ``,
              `### Downloads`,
              ``,
              `| Platform | File | Notes |`,
              `|----------|------|-------|`,
              `| Windows  | \`HysCode-Setup-*.exe\` (NSIS) | Recommended installer |`,
              `| Windows  | \`HysCode_*.msi\` | MSI installer |`,
              `| Linux    | \`hyscode_*.AppImage\` | Universal Linux |`,
              `| Linux    | \`hyscode_*.deb\` | Debian/Ubuntu |`,
              ``,
              prerelease
                ? `> ⚠️ **Pre-release** — available via the _Pre-release_ update channel in HysCode Settings → General → Updates.`
                : `> ✅ **Stable** — delivered automatically to users on the _Stable_ update channel.`,
              ``,
              `### Changelog`,
              `See commit history for full list of changes.`,
            ].join('\n')

            // Check if a release already exists for this tag
            let releaseData
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                tag:   tag,
              })
              console.log(`Release for ${tag} already exists (id=${existing.data.id}) — reusing it`)
              releaseData = existing.data
            } catch (e) {
              if (e.status !== 404) throw e
              // No release yet — create a fresh draft
              const created = await github.rest.repos.createRelease({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                tag_name:   tag,
                name:       `HysCode ${tag}`,
                body:       body,
                draft:      true,
                prerelease: prerelease,
              })
              console.log(`✓ Draft release created: ${created.data.html_url}`)
              releaseData = created.data
            }
            return releaseData.id

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Build Windows
# ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (Windows x64 — binary only)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          # No releaseId — we upload the Inno Setup installer manually below
          args: --target x86_64-pc-windows-msvc --bundles msi

      - name: Build Inno Setup installer
        shell: pwsh
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup --no-progress -y
          }
          # Pass version as preprocessor define; also override OutputBaseFilename
          # so the produced file is always named with the Actions version.
          $innoOutDir = "apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/inno"
          & $iscc `
            "/DMyAppVersion=$env:VERSION" `
            "/FHysCode-Setup-$env:VERSION-x64" `
            "/O$innoOutDir" `
            "apps/desktop/src-tauri/installer/windows/hyscode.iss"
          if ($LASTEXITCODE -ne 0) { exit 1 }
          # Find the produced .exe (fallback: any .exe in the inno dir)
          $out = Join-Path $innoOutDir "HysCode-Setup-$env:VERSION-x64.exe"
          if (-not (Test-Path $out)) {
            $out = Get-ChildItem $innoOutDir -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $out -or -not (Test-Path $out)) { Write-Error "Inno installer not found in $innoOutDir"; exit 1 }
          Write-Host "Inno installer: $out"
          "INNO_INSTALLER=$out" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Inno Setup installer to release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag_name }}
        run: |
          gh release upload $env:TAG "$env:INNO_INSTALLER" --clobber

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Build Linux
# ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (Linux x64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Publish release (after all platform builds succeed)
# ─────────────────────────────────────────────────────────────────────────────
  publish-release:
    needs: [create-release, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId  = ${{ needs.create-release.outputs.release_id }}
            const prerelease = "${{ needs.create-release.outputs.prerelease }}" === "true"
            const label = prerelease ? "Pre-release" : "Stable release"
            try {
              const { data } = await github.rest.repos.updateRelease({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                release_id: releaseId,
                draft:      false,
                prerelease: prerelease,
              })
              console.log(`✓ ${label} published: ${data.html_url}`)
            } catch (e) {
              if (e.status === 422 && JSON.stringify(e.response?.data?.errors ?? []).includes('already_exists')) {
                console.log(`Release already published — skipping (${e.message})`)
              } else {
                throw e
              }
            }
