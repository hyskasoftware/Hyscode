name: "Build & Release"

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
#
# push → main (auto-build / pre-release)
#   Version = <root package.json version>-build.<run_number>
#   e.g. root package.json "0.1.3-preview" → tag v0.1.3-preview-build.42
#   Pre-release is inferred: any version with a pre-release identifier → prerelease=true
#
# workflow_dispatch (manual / stable release)
#   Developer supplies the target version (e.g. 1.0.0 or 1.0.0-beta.1).
#   CI bumps ALL version files, commits back with [skip ci], then builds.
#
# In both cases the CI commits the bumped versions back to main so that
# `git pull` always gives the developer the exact version that was shipped.
#
# ── Build job checkout ───────────────────────────────────────────────────────
# Build jobs always check out the SHA produced by the version-bump commit
# (outputs.bumped_sha), not the original trigger SHA.  This guarantees that
# tauri.conf.json / Cargo.toml contain the correct version when the binary is
# compiled.
#
# ── IDE Update System ────────────────────────────────────────────────────────
# apps/desktop/src-tauri/src/commands/updater.rs reads app.package_info().version
# (from tauri.conf.json) as the installed version — not CARGO_PKG_VERSION.
#   Stable channel    → GET /repos/hyskasoftware/Hyscode/releases/latest
#   Pre-release ch.   → GET /repos/hyskasoftware/Hyscode/releases?per_page=20
#                        (picks the highest semver with a compatible platform asset)
#
# Asset selection by extension:
#   Windows → .exe (preferred) or .msi
#   Linux   → .AppImage (preferred) or .deb
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "New version (e.g. 1.2.3 or 1.2.3-beta.1)"
        required: true
        type: string
      release_type:
        description: "Release type"
        required: true
        type: choice
        options:
          - stable
          - pre-release
        default: stable

env:
  TAURI_SIGNING_PRIVATE_KEY: ""

permissions:
  contents: write

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Bump versions, create tag + draft release
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      tag_name:   ${{ steps.get-version.outputs.tag }}
      version:    ${{ steps.get-version.outputs.version }}
      prerelease: ${{ steps.get-version.outputs.prerelease }}
      # SHA of the version-bump commit (or the original HEAD if nothing changed).
      # Build jobs check out this SHA so they always compile the bumped version.
      bumped_sha: ${{ steps.version-bump.outputs.sha }}

    steps:
      - uses: actions/checkout@v4
        with:
          # GH_PAT lets the Actions bot push commits back to main without
          # triggering the "same-token push ignores [skip ci]" quirk on some plans.
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 1. Resolve the version to ship ──────────────────────────────────────
      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            if [ -z "$VERSION" ]; then
              echo "::error::Version input is required for manual dispatch"
              exit 1
            fi
            if [ "${{ github.event.inputs.release_type }}" = "pre-release" ]; then
              IS_PRERELEASE=true
            else
              IS_PRERELEASE=false
            fi
          else
            # Push trigger: base version lives in root package.json; append build number.
            BASE=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
            VERSION="${BASE}-build.${{ github.run_number }}"
            if echo "$BASE" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+-.+'; then
              IS_PRERELEASE=true
            else
              IS_PRERELEASE=false
            fi
          fi
          echo "version=$VERSION"          >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"             >> "$GITHUB_OUTPUT"
          echo "prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Releasing: $VERSION  |  pre-release: $IS_PRERELEASE"

      # ── 2. Write the version into every source file ──────────────────────────
      # Always runs for both push and workflow_dispatch triggers.
      # For workflow_dispatch the root package.json is also updated so the next
      # push auto-build inherits the new base version.
      - name: Bump version in source files
        env:
          VERSION: ${{ steps.get-version.outputs.version }}
        run: |
          # tauri.conf.json — authoritative runtime version (read by app.package_info())
          python3 -c "
          import json, os
          p = 'apps/desktop/src-tauri/tauri.conf.json'
          d = json.load(open(p))
          d['version'] = os.environ['VERSION']
          open(p, 'w').write(json.dumps(d, indent=2, ensure_ascii=False) + '\n')
          "
          # Cargo.toml — first [package] version field only
          sed -i "0,/^version = \"[^\"]*\"/{s/^version = \"[^\"]*\"/version = \"$VERSION\"/}" \
            apps/desktop/src-tauri/Cargo.toml
          # apps/desktop/package.json
          python3 -c "
          import json, os
          p = 'apps/desktop/package.json'
          d = json.load(open(p))
          d['version'] = os.environ['VERSION']
          open(p, 'w').write(json.dumps(d, indent=2, ensure_ascii=False) + '\n')
          "
          # root package.json — only for workflow_dispatch so the next push
          # auto-build uses the new version as its base.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python3 -c "
          import json, os
          p = 'package.json'
          d = json.load(open(p))
          d['version'] = os.environ['VERSION']
          open(p, 'w').write(json.dumps(d, indent=2, ensure_ascii=False) + '\n')
            "
          fi
          echo "Bumped all version files to $VERSION"

      # ── 3. Commit & push the version bump back to main ───────────────────────
      # [skip ci] prevents this commit from triggering a recursive run.
      # The step always outputs the current HEAD SHA (bumped or not) so build
      # jobs can check out the exact tree that was versioned.
      - name: Commit and push version bump
        id: version-bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/desktop/src-tauri/tauri.conf.json \
                  apps/desktop/src-tauri/Cargo.toml \
                  apps/desktop/package.json
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git add package.json
          fi
          if git diff --cached --quiet; then
            echo "Nothing to commit — versions already at ${{ steps.get-version.outputs.version }}"
          else
            git commit -m "chore: bump version to ${{ steps.get-version.outputs.version }} [skip ci]"
            git push
            echo "✓ Version bump committed and pushed"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # ── 4. Create the git tag (points at the version-bump commit) ───────────
      - name: Create git tag
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const tag = "${{ steps.get-version.outputs.tag }}"
            const sha = "${{ steps.version-bump.outputs.sha }}"
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                ref:   `refs/tags/${tag}`,
                sha:   sha,
              })
              console.log(`✓ Tag ${tag} created at ${sha.slice(0, 7)}`)
            } catch (e) {
              if (e.status === 422) {
                console.log(`Tag ${tag} already exists — continuing`)
              } else {
                throw e
              }
            }

      # ── 5. Create draft release ──────────────────────────────────────────────
      - name: Create draft release
        id: create-release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          script: |
            const version    = "${{ steps.get-version.outputs.version }}"
            const tag        = "${{ steps.get-version.outputs.tag }}"
            const prerelease = "${{ steps.get-version.outputs.prerelease }}" === "true"
            const body = [
              `## HysCode ${tag}`,
              ``,
              `### Downloads`,
              ``,
              `| Platform | File | Notes |`,
              `|----------|------|-------|`,
              `| Windows  | \`HysCode-Setup-*.exe\` (NSIS) | Recommended installer |`,
              `| Windows  | \`HysCode_*.msi\` | MSI installer |`,
              `| Linux    | \`hyscode_*.AppImage\` | Universal Linux |`,
              `| Linux    | \`hyscode_*.deb\` | Debian/Ubuntu |`,
              ``,
              prerelease
                ? `> ⚠️ **Pre-release** — available via the _Pre-release_ update channel in HysCode Settings → General → Updates.`
                : `> ✅ **Stable** — delivered automatically to users on the _Stable_ update channel.`,
              ``,
              `### Changelog`,
              `See commit history for full list of changes.`,
            ].join('\n')

            let releaseData
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                tag:   tag,
              })
              console.log(`Release for ${tag} already exists (id=${existing.data.id}) — reusing it`)
              releaseData = existing.data
            } catch (e) {
              if (e.status !== 404) throw e
              const created = await github.rest.repos.createRelease({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                tag_name:   tag,
                name:       `HysCode ${tag}`,
                body:       body,
                draft:      true,
                prerelease: prerelease,
              })
              console.log(`✓ Draft release created: ${created.data.html_url}`)
              releaseData = created.data
            }
            return releaseData.id

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Build Windows
# ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the version-bump commit, not the original trigger SHA.
          ref: ${{ needs.create-release.outputs.bumped_sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows x64 — binary only)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          # --no-bundle: skip MSI/NSIS bundle. MSI rejects semver pre-release
          # identifiers (e.g. "0.1.2-preview-build.21"). We only need the
          # compiled binary; Inno Setup step below creates the actual installer.
          args: --target x86_64-pc-windows-msvc --no-bundle

      - name: Build Inno Setup installer
        shell: pwsh
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            choco install innosetup --no-progress -y
          }
          # Pass version as preprocessor define; also override OutputBaseFilename
          # so the produced file is always named with the Actions version.
          $innoOutDir = "apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/inno"
          & $iscc `
            "/DMyAppVersion=$env:VERSION" `
            "/FHysCode-Setup-$env:VERSION-x64" `
            "/O$innoOutDir" `
            "apps/desktop/src-tauri/installer/windows/hyscode.iss"
          if ($LASTEXITCODE -ne 0) { exit 1 }
          # Find the produced .exe (fallback: any .exe in the inno dir)
          $out = Join-Path $innoOutDir "HysCode-Setup-$env:VERSION-x64.exe"
          if (-not (Test-Path $out)) {
            $out = Get-ChildItem $innoOutDir -Filter "*.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1 -ExpandProperty FullName
          }
          if (-not $out -or -not (Test-Path $out)) { Write-Error "Inno installer not found in $innoOutDir"; exit 1 }
          Write-Host "Inno installer: $out"
          "INNO_INSTALLER=$out" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload Inno Setup installer to release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.create-release.outputs.tag_name }}
        run: |
          gh release upload $env:TAG "$env:INNO_INSTALLER" --clobber

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — Build Linux
# ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the version-bump commit, not the original trigger SHA.
          ref: ${{ needs.create-release.outputs.bumped_sha }}

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Linux x64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}

# ─────────────────────────────────────────────────────────────────────────────
# JOB 4 — Publish release (after all platform builds succeed)
# ─────────────────────────────────────────────────────────────────────────────
  publish-release:
    needs: [create-release, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            const releaseId  = ${{ needs.create-release.outputs.release_id }}
            const prerelease = "${{ needs.create-release.outputs.prerelease }}" === "true"
            const label = prerelease ? "Pre-release" : "Stable release"
            try {
              const { data } = await github.rest.repos.updateRelease({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                release_id: releaseId,
                draft:      false,
                prerelease: prerelease,
              })
              console.log(`✓ ${label} published: ${data.html_url}`)
            } catch (e) {
              if (e.status === 422 && JSON.stringify(e.response?.data?.errors ?? []).includes('already_exists')) {
                console.log(`Release already published — skipping (${e.message})`)
              } else {
                throw e
              }
            }
